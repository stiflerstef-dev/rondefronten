<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Rondefronten.nl</title>
    <meta name="description" content="Bekijk ons portfolio van boogkasten op maat.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --background: 30 25% 97%;
        --foreground: 25 30% 15%;
        --card: 30 20% 99%;
        --primary: 25 40% 35%;
        --primary-foreground: 30 25% 97%;
        --muted: 30 15% 92%;
        --muted-foreground: 25 20% 45%;
        --border: 30 15% 88%;
        --accent: 30 25% 94%;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        line-height: 1.6;
        min-height: 100vh;
      }
      header {
        background-color: hsl(var(--card));
        border-bottom: 1px solid hsl(var(--border));
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: hsl(var(--primary));
        text-decoration: none;
      }
      nav a {
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        color: hsl(var(--muted-foreground));
        text-decoration: none;
        margin-left: 2rem;
        transition: color 0.2s;
      }
      nav a:hover, nav a.active { color: hsl(var(--foreground)); }
      .hero {
        background: linear-gradient(135deg, hsl(var(--primary)), #60432e);
        color: hsl(var(--primary-foreground));
        padding: 4rem 2rem;
        text-align: center;
      }
      .hero h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 500;
        margin-bottom: 0.75rem;
        letter-spacing: 0.02em;
      }
      .hero p { font-size: 1rem; opacity: 0.85; max-width: 500px; margin: 0 auto; }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .content-card {
        background-color: hsl(var(--card));
        border: 1px solid hsl(var(--border));
        border-radius: 12px;
        padding: 4rem 2.5rem;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        text-align: center;
        width: 100%;
      }
      .content-card .icon {
        width: 56px;
        height: 56px;
        background-color: hsl(var(--accent));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }
      .content-card .icon svg {
        width: 26px;
        height: 26px;
        color: hsl(var(--primary));
      }
      .content-card h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 2rem;
        font-weight: 500;
        color: hsl(var(--foreground));
        margin-bottom: 0.75rem;
      }
      .content-card p {
        color: hsl(var(--muted-foreground));
        font-size: 0.95rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2rem;
        font-size: 0.875rem;
        color: hsl(var(--muted-foreground));
        text-decoration: none;
        transition: color 0.2s;
      }
      .back-link:hover { color: hsl(var(--foreground)); }
      footer {
        text-align: center;
        padding: 2rem;
        color: hsl(var(--muted-foreground));
        font-size: 0.8rem;
        border-top: 1px solid hsl(var(--border));
        margin-top: 4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="logo" href="/">Rondefronten</a>
      <nav>
        <a href="/">Home</a>
        <a href="/portfolio.html" class="active">Portfolio</a>
        <a href="/over-ons.html">Over Ons</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </header>

    <div class="hero">
      <h1>Portfolio</h1>
      <p>Een selectie van onze gerealiseerde boogkasten.</p>
    </div>

    <main>
      <div class="content-card">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3 21h18M6.75 6.75h.008v.008H6.75V6.75z" />
          </svg>
        </div>
        <h2>Content is coming</h2>
        <p>Binnenkort vindt u hier een overzicht van onze realisaties.</p>
      </div>

      <a class="back-link" href="/">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Terug naar de hoofdpagina
      </a>
    </main>

    <footer>
      &copy; 2026 Rondefronten.nl &mdash; Alle rechten voorbehouden
    </footer>
  </body>
</html>
