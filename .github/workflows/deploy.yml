name: Deploy naar rondefronten.nl

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST https://rondefronten.nl/deploy/RondeFrontenDeploy2026! && echo "Deploy getriggerd!"
